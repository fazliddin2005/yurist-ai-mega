<!DOCTYPE html>
<html>
<head><title>Google Login</title>
<style>
body{font-family:Arial,sans-serif;display:flex;justify-content:center;align-items:center;height:100vh;margin:0;background:#0d2233}
.box{text-align:center;padding:32px 40px;background:#fff;border-radius:16px;box-shadow:0 4px 24px rgba(0,0,0,.2)}
.icon{font-size:40px;margin-bottom:12px}
.msg{font-size:15px;color:#555}
</style>
</head>
<body>
<div class="box" id="box">
  <div class="icon">⏳</div>
  <div class="msg" id="msg">Yuklanmoqda...</div>
</div>
<script>
// URL hash'dan access_token olish (response_type=token)
var hash = window.location.hash.replace('#','');
var params = new URLSearchParams(hash);
var token = params.get('access_token');
var error = params.get('error');

function showOk() {
  document.getElementById('box').innerHTML =
    '<div class="icon">✅</div><div class="msg" style="color:#16a34a">Muvaffaqiyatli! Oyna yopilmoqda...</div>';
}
function showErr(msg) {
  document.getElementById('box').innerHTML =
    '<div class="icon">❌</div><div class="msg" style="color:#dc2626">' + (msg||'Xato') + '</div>';
}

if (token) {
  showOk();

  // 1. postMessage -- eng ishonchli, bir xil origin (yurist-ai-mega.vercel.app)
  try {
    if (window.opener && !window.opener.closed) {
      window.opener.postMessage({ g_token: token }, window.location.origin);
    }
  } catch(e) { console.warn('postMessage xato:', e); }

  // 2. BroadcastChannel
  try {
    var bc = new BroadcastChannel('g_oauth');
    bc.postMessage({ token: token });
    setTimeout(function(){ try{ bc.close(); }catch(e){} }, 1000);
  } catch(e) {}

  // 3. localStorage (eski brauzerlar uchun fallback)
  try { localStorage.setItem('g_token', token); } catch(e) {}

  // Oynani yopish
  setTimeout(function(){ window.close(); }, 1000);

} else if (error) {
  showErr(decodeURIComponent(error));
  setTimeout(function(){ window.close(); }, 2500);
} else {
  showErr('Token topilmadi');
  setTimeout(function(){ window.close(); }, 2500);
}
</script>
</body>
</html>
